
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Countdown Timer</title>
  <link rel="icon" href="timer.png" type="image/gif" sizes="16x16">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      margin-top: 100px;
    }
    #countdown {
      font-size: 50px;
      margin-top: 20px;
    }
  </style>
</head>
<body>


  <div id="countdown">Loading...</div>

  <script>
    // 🔧 SET YOUR DATE & TIME HERE
    const targetDate = new Date("March 31, 2026 19:52:00").getTime();

    // 🔗 SET YOUR REDIRECT LINK HERE
    const redirectURL = "wish.html";

    const countdownElement = document.getElementById("countdown");

    const timer = setInterval(function () {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        clearInterval(timer);
       // countdownElement.innerHTML = "Redirecting...";
        
        // 🚀 Redirect when time is up
        window.location.href = redirectURL;
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      countdownElement.innerHTML =
        days + "d " +
        hours + "h " +
        minutes + "m " +
        seconds + "s ";
    }, 1000);
  </script>

</body>
</html>
